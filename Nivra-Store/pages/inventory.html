<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">


<title>NIVRA Inventory</title>


<link rel="stylesheet" href="../css/dashboard.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>



<header class="topbar">


<div>


<h1>

NIVRA 🤍

</h1>


<span>

إدارة المخزون الذكي

</span>


</div>



<a class="back-btn"

href="../dashboard.html">


<i class="fa-solid fa-arrow-right"></i>


</a>



</header>








<main>






<!-- الاحصائيات -->


<section class="cards">



<div class="card">


<i class="fa-solid fa-boxes-stacked"></i>


<h3>

كل القطع

</h3>


<h2 id="totalItems">

0

</h2>


</div>





<div class="card">


<i class="fa-solid fa-triangle-exclamation"></i>


<h3>

مخزون قليل

</h3>


<h2 id="lowStock">

0

</h2>


</div>






<div class="card">


<i class="fa-solid fa-box-open"></i>


<h3>

نفذ المخزون

</h3>


<h2 id="outStock">

0

</h2>


</div>




</section>









<!-- تعديل المخزون -->


<section class="card">



<h2>

<i class="fa-solid fa-sliders"></i>

إدارة القطعة

</h2>





<div class="form-grid">





<div>


<label>

<i class="fa-solid fa-layer-group"></i>

الصنف

</label>


<select id="category">


<option>

اختار الصنف

</option>


</select>


</div>







<div>


<label>


<i class="fa-solid fa-shirt"></i>

المنتج


</label>


<select id="product">


<option>

اختار المنتج

</option>


</select>


</div>







<div>


<label>


<i class="fa-solid fa-palette"></i>

اللون والحجم


</label>


<select id="variant">


<option>

اختار التفاصيل

</option>


</select>


</div>





</div>









<div id="variantInfo"

class="stock-info">


</div>




</section>












<!-- حركة المخزون -->


<section class="card">



<h2>


<i class="fa-solid fa-arrows-left-right"></i>


حركة المخزون


</h2>







<div class="form-grid">



<select id="movementType">


<option value="IN">

➕ إضافة كمية

</option>


<option value="OUT">

➖ خصم كمية

</option>


</select>






<input

id="quantity"

type="number"

placeholder="الكمية">






<input

id="note"

placeholder="سبب العملية">


</div>







<button id="saveMovement">


<i class="fa-solid fa-floppy-disk"></i>


حفظ العملية


</button>




</section>













<!-- البحث -->


<section class="card">


<h2>


<i class="fa-solid fa-magnifying-glass"></i>


بحث متقدم بالمخزون


</h2>





<div class="search-box">



<input

id="search"

placeholder="ابحث باسم المنتج أو اللون أو القياس أو الصنف">





<select id="stockFilter">


<option value="">


كل المخزون


</option>



<option value="available">


متوفر


</option>



<option value="low">


مخزون قليل


</option>



<option value="out">


نفذ


</option>



</select>



</div>




</section>













<!-- المخزون الحالي -->


<section class="card">



<h2>


<i class="fa-solid fa-warehouse"></i>


المخزون الحالي


</h2>





<div class="table-box">



<table>



<thead>


<tr>



<th>

الصنف

</th>



<th>

المنتج

</th>



<th>

اللون

</th>



<th>

الحجم

</th>



<th>

السعر

</th>



<th>

المتوفر

</th>



<th>

الحالة

</th>



</tr>



</thead>





<tbody id="inventoryList">


</tbody>





</table>



</div>



</section>



<!-- سجل الحركات -->



<section class="card">



<h2>


<i class="fa-solid fa-clock-rotate-left"></i>


سجل الحركات


</h2>







<div class="table-box">


<table>


<thead>


<tr>



<th>

القطعة

</th>



<th>

العملية

</th>



<th>

الكمية

</th>



<th>

الملاحظة

</th>



<th>

التاريخ

</th>



</tr>



</thead>





<tbody id="movementList">


</tbody>



</table>



</div>




</section>







</main>







<script type="module"

src="../js/inventory.js">


</script>




</body>


</html>
