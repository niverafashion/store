<!DOCTYPE html>

<html lang="ar" dir="rtl">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>NIVRA Variants</title>



<link rel="stylesheet" href="../css/dashboard.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>



<body>





<header class="topbar">


<div>


<h1>
NIVRA
</h1>


<span>
إدارة الألوان والأحجام
</span>


</div>




<button class="back-btn"
onclick="location.href='../dashboard.html'">


<i class="fa-solid fa-arrow-right"></i>


</button>



</header>









<main>






<section class="welcome">


<h2>


<i class="fa-solid fa-palette"></i>


تفاصيل المنتجات


</h2>


<p>

إدارة الألوان والأحجام والمخزون لكل منتج

</p>


</section>









<section class="form-box">





<h2>


<i class="fa-solid fa-plus"></i>


إضافة تفاصيل منتج


</h2>








<label>

الصنف

</label>



<select id="category">


<option value="">

اختار الصنف

</option>


</select>







<label>

المنتج

</label>



<select id="product">


<option value="">

اختار المنتج

</option>


</select>









<input

id="color"

placeholder="اسم اللون مثال: وردي"

>









<input

id="size"

placeholder="الحجم مثال: M"

>









<input

id="sku"

placeholder="SKU مثال NIV-001"

>









<input

id="stock"

type="number"

placeholder="الكمية"

>









<input

id="image"

placeholder="مسار صورة القطعة"

>










<button id="saveVariant">


<i class="fa-solid fa-floppy-disk"></i>


حفظ التفاصيل


</button>





</section>









<hr>









<h2 class="section-title">


<i class="fa-solid fa-list"></i>


تفاصيل المنتجات


</h2>







<div class="table-box">



<table>


<thead>


<tr>


<th>
الصورة
</th>



<th>
المنتج
</th>



<th>
اللون
</th>



<th>
الحجم
</th>



<th>
المخزون
</th>



<th>
SKU
</th>



<th>
الإجراءات
</th>



</tr>


</thead>






<tbody id="variantList">


</tbody>




</table>



</div>









</main>








<script type="module" src="../js/variants.js"></script>



</body>


</html>
