<!DOCTYPE html>

<html lang="ar" dir="rtl">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>NIVRA Categories</title>




<link rel="stylesheet" href="../css/gategories.css">


<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>



<body>





<header class="topbar">


<div>


<h1>
NIVRA
</h1>


<span>
إدارة الأصناف
</span>


</div>





<button class="back-btn"
onclick="location.href='../dashboard.html'">


<i class="fa-solid fa-arrow-right"></i>


</button>



</header>








<main>






<section class="welcome">


<h2>

<i class="fa-solid fa-folder-open"></i>

إدارة أصناف المتجر


</h2>


<p>

إضافة وتعديل وحذف الأصناف الخاصة بالمنتجات

</p>


</section>









<section class="form-box">



<h2>

<i class="fa-solid fa-plus"></i>

إضافة صنف جديد

</h2>






<input 

id="name"

placeholder="اسم الصنف"
maxlength="20">







<textarea

id="description"

placeholder="وصف الصنف"
maxlength="50">


</textarea>







<input 

id="image"

placeholder="رابط صورة الصنف">







<button id="save">


<i class="fa-solid fa-floppy-disk"></i>


حفظ الصنف


</button>






</section>









<hr>







<h2 class="section-title">


<i class="fa-solid fa-layer-group"></i>


الأصناف الموجودة


</h2>







<section id="list" class="category-list">



</section>









</main>











<button id="scrollTop" class="scroll-top">

<i class="fa-solid fa-arrow-down"></i>

</button>
</body>

<script type="module" src="../js/categories.js"></script>
</html>
