<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">


<title>NIVRA Inventory</title>


<link rel="stylesheet" href="../css/inventory.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>



<header class="topbar">


<div>

<h1>

NIVRA

</h1>


<span>

إدارة المخزون الذكي

</span>


</div>



<a class="back-btn"

href="../dashboard.html">


<i class="fa-solid fa-arrow-right"></i>


</a>



</header>







<main>





<!-- =====================
 الاحصائيات
===================== -->


<section class="cards">



<div class="card stat-card">


<i class="fa-solid fa-shirt"></i>


<h4>

كل المنتجات

</h4>


<h2 id="totalProducts">

0

</h2>


</div>






<div class="card stat-card">


<i class="fa-solid fa-boxes-stacked"></i>


<h4>

كل القطع

</h4>


<h2 id="totalItems">

0

</h2>


</div>







<div class="card stat-card">


<i class="fa-solid fa-triangle-exclamation"></i>


<h4>

مخزون قليل

</h4>


<h2 id="lowStock">

0

</h2>


</div>







<div class="card stat-card">


<i class="fa-solid fa-box-open"></i>


<h4>

نفذ المخزون

</h4>


<h2 id="outStock">

0

</h2>


</div>




</section>









<!-- =====================
 ادارة + حركة
===================== -->


<section class="card">



<h2>

<i class="fa-solid fa-sliders"></i>

إدارة المخزون

</h2>





<div class="form-grid">



<div>


<label>

<i class="fa-solid fa-layer-group"></i>

الصنف

</label>


<select id="category">


<option>

اختار الصنف

</option>


</select>


</div>







<div>


<label>

<i class="fa-solid fa-shirt"></i>

المنتج

</label>


<select id="product">


<option>

اختار المنتج

</option>


</select>


</div>








<div>


<label>

<i class="fa-solid fa-palette"></i>

التفاصيل

</label>


<select id="variant">


<option>

اختار اللون والحجم

</option>


</select>


</div>



</div>







<div id="variantInfo"

class="stock-info">

</div>






<hr>






<h2>


<i class="fa-solid fa-arrows-left-right"></i>

حركة المخزون


</h2>







<div class="form-grid">





<select id="movementType">


<option value="IN">

➕ إضافة كمية

</option>



<option value="OUT">

➖ خصم كمية

</option>



</select>







<input

id="quantity"

type="number"

placeholder="الكمية"

>







<input

id="note"

placeholder="سبب العملية"

>




</div>







<button id="saveMovement">


<i class="fa-solid fa-floppy-disk"></i>


حفظ العملية


</button>




</section>









<!-- =====================
 المخزون الحالي
===================== -->


<section class="card">



<h2>


<i class="fa-solid fa-warehouse"></i>


المخزون الحالي


</h2>








<!-- البحث داخل المخزون -->


<div class="inventory-search">



<input

id="searchSKU"

placeholder="بحث بواسطة SKU"

>






<select id="stockCategory">


<option value="">

كل الأصناف

</option>


</select>







<select id="stockProduct">


<option value="">

كل المنتجات

</option>


</select>







<select id="stockSize">


<option value="">

كل الأحجام

</option>


</select>







<select id="stockColor">


<option value="">

كل الألوان

</option>


</select>






<select id="stockFilter">


<option value="">

كل المخزون

</option>


<option value="available">

متوفر

</option>


<option value="low">

مخزون قليل

</option>


<option value="out">

نفذ

</option>



</select>



</div>










<div class="table-box">



<table>



<thead>


<tr>


<th>

الصنف

</th>


<th>

المنتج

</th>



<th>

اللون

</th>



<th>

الحجم

</th>



<th>

SKU

</th>



<th>

السعر

</th>



<th>

المتوفر

</th>



<th>

الحالة

</th>



</tr>



</thead>





<tbody id="inventoryList">


</tbody>





</table>



</div>





</section>









<!-- =====================
 سجل الحركات
===================== -->


<section class="card">



<h2>


<i class="fa-solid fa-clock-rotate-left"></i>


سجل الحركات


</h2>







<div class="table-box">


<table>


<thead>


<tr>


<th>

القطعة

</th>


<th>

العملية

</th>



<th>

الكمية

</th>



<th>

الملاحظة

</th>



<th>

التاريخ

</th>



</tr>


</thead>





<tbody id="movementList">


</tbody>



</table>



</div>



</section>










</main>







<script type="module"

src="../js/inventory.js">

</script>





</body>

</html>
