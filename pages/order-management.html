<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">


<title>NIVRA Order Management</title>


<link rel="stylesheet" href="../css/order-management.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>



<body>



<header class="topbar">


<a class="accounts-btn"
href="accounts.html"
title="الحسابات">

<i class="fa-solid fa-dollar-sign"></i>

</a>



<div>

<h1>
NIVRA
</h1>

<span>
إدارة الطلبات
</span>

</div>



<a class="back-btn"
href="../dashboard.html">

<i class="fa-solid fa-arrow-right"></i>

</a>


</header>







<main>





<!-- حالات الطلبات -->


<section class="order-status-cards">





<button class="status-card new"
data-status="new">


<i class="fa-solid fa-bell"></i>


<h3>
جديد
</h3>


<span id="newCount">
0
</span>


</button>







<button class="status-card ready"
data-status="prepared">


<i class="fa-solid fa-box"></i>


<h3>
مجهز
</h3>


<span id="preparedCount">
0
</span>


</button>







<button class="status-card delivery"
data-status="delivery">


<i class="fa-solid fa-truck"></i>


<h3>
قيد التوصيل
</h3>


<span id="deliveryCount">
0
</span>


</button>







<button class="status-card done"
data-status="completed">


<i class="fa-solid fa-check"></i>


<h3>
مكتمل
</h3>


<span id="completedCount">
0
</span>

</button>







<button class="status-card delayed"
data-status="postponed">


<i class="fa-solid fa-clock"></i>


<h3>
مؤجل
</h3>


<span id="postponedCount">
0
</span>


</button>







<button class="status-card rejected"
data-status="cancelled">


<i class="fa-solid fa-xmark"></i>


<h3>
مرفوض
</h3>


<span id="cancelledCount">
0
</span>


</button>
<!-- الرواجع الجزئية -->
<button class="status-card partial"
data-status="partial_return">

<i class="fa-solid fa-rotate-left"></i>

<h3>رواجع جزئية</h3>

<span id="partialReturnCount">0</span>

</button>


</section>

</section>



<!-- الطلبات -->


<section class="card">

<div class="orders-search-card">


<div class="control-bar">


<h2>
<i class="fa-solid fa-cart-shopping"></i>
البحث في الطلبات
</h2>


<div class="search-mini">

<i class="fa-solid fa-magnifying-glass"></i>

<input 
id="search"
placeholder="بحث...">

</div>



<label class="select-all">

<input type="checkbox" id="selectAll">

تحديد الكل

</label>



<div class="control-icons">


<button id="bulkUpdate">

<i class="fa-solid fa-rotate"></i>

</button>


<button id="bulkDelete">

<i class="fa-solid fa-trash"></i>

</button>


</div>


</div>



<div class="table-box">

<table>

<thead>

<tr>

<th>
<input 
type="checkbox"
id="selectAll">
</th>


<th>
رقم
</th>



<th>
الزبون
</th>



<th>
الهاتف
</th>



<th>
المحافظة
</th>



<th>
القطعة
</th>



<th>
المبلغ
</th>



<th>
الحالة
</th>



<th>
إجراءات
</th>



</tr>


</thead>


<tbody id="ordersTable">

</tbody>


</table>


</div>



</div>



</section>



<!-- تعديل الطلب -->


<div id="modal">

<div class="card modal-box">

<button id="close">
<i class="fa-solid fa-xmark"></i>
</button>

<div id="details"></div>

</div>

</div>

<div id="redeliveryModal" class="modal">


<div class="modal-content redelivery-box">


<h2>
🚚 إعادة توصيل الطلب
</h2>



<!-- معلومات الزبون -->


<input 
id="rdName"
placeholder="اسم الزبون">


<input 
id="rdPhone"
placeholder="رقم الهاتف">



<select id="rdGovernorate">

<option value="">
اختر المحافظة
</option>

</select>




<!-- التوصيل -->


<label class="check-row">


<input 
type="checkbox"
id="autoDelivery"
checked>


تحديد أجور التوصيل تلقائي حسب المحافظة


</label>




<div id="manualDeliveryBox">


<label>
أجور التوصيل
</label>


<input 

id="rdDelivery"

type="number"

placeholder="أجور التوصيل">


</div>





<input 
id="rdAddress"
placeholder="العنوان">


<input 
id="rdNearest"
placeholder="أقرب نقطة">





<!-- استقطاع راجع جزئي -->


<label class="check-row">


<input 

type="checkbox"

id="useReturnAmount">


استقطاع مبلغ راجع جزئي


</label>




<div 
id="returnAmountBox"
style="display:none;">


<input 

id="returnAmount"

type="number"

value="5000"

placeholder="مبلغ الاستقطاع">


</div>







<!-- الخصم -->


<label class="check-row">


<input 

type="checkbox"

id="useDiscount">


إضافة خصم


</label>





<div 

id="discountBox"

style="display:none;">


<input 

id="rdDiscount"

type="number"

placeholder="قيمة الخصم">


</div>







<!-- الحساب -->


<div class="rd-total-box">


<div>

قيمة المنتجات:

<span id="rdSubtotal">
0
</span>

د.ع

</div>



<div>

التوصيل:

<span id="rdDeliveryShow">
0
</span>

د.ع

</div>



<div>

الاستقطاع:

<span id="rdRefundShow">
0
</span>

د.ع

</div>



<div>

الخصم:

<span id="rdDiscountShow">
0
</span>

د.ع

</div>




<hr>



<h3>

المجموع النهائي:

<span id="rdFinalTotal">
0
</span>

د.ع

</h3>



</div>








<button 

id="saveRedelivery">

حفظ إعادة التوصيل

</button>




<button 

id="closeRedelivery">

إلغاء

</button>





</div>

</div>

<!-- كاميرا الباركود -->
<div id="scanModal" class="scan-modal">


<div class="scan-box">


<h3>
إضافة كود الشحن
</h3>



<div id="reader"></div>



<input

id="manualCode"

placeholder="اكتب الكود يدوياً"


>



<button id="addManualCode">

إضافة الكود

</button>



<p id="scanMessage"></p>



<button id="closeScanner">
</button>



</div>


</div>

<button id="scrollTop" class="scroll-top">

<i class="fa-solid fa-arrow-down"></i>

</button>


<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module" src="../js/order-management.js"></script>


</script>

</html>
