<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NIVRA Order Management</title>


<link rel="stylesheet" href="../css/dashboard.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>


<body>



<header class="topbar">


<div>

<h1>
NIVRA 🤍
</h1>


<span>
إدارة الطلبات والتحليل الذكي
</span>


</div>



<a class="back-btn"
href="../dashboard.html">

<i class="fa-solid fa-arrow-right"></i>

</a>


</header>





<main>



<section class="order-status-cards">



<button class="status-card all"
data-status="">

<i class="fa-solid fa-layer-group"></i>

<h3>
كل الطلبات
</h3>

<span id="allCount">
0
</span>

</button>





<button class="status-card new"
data-status="new">

<i class="fa-solid fa-bell"></i>

<h3>
جديد
</h3>

<span id="newCount">
0
</span>

</button>





<button class="status-card ready"
data-status="ready">

<i class="fa-solid fa-box"></i>

<h3>
مجهز
</h3>

<span id="readyCount">
0
</span>

</button>





<button class="status-card delivery"
data-status="delivery">

<i class="fa-solid fa-truck"></i>

<h3>
قيد التوصيل
</h3>

<span id="deliveryCount">
0
</span>

</button>





<button class="status-card done"
data-status="done">

<i class="fa-solid fa-check"></i>

<h3>
مكتمل
</h3>

<span id="doneCount">
0
</span>

</button>





<button class="status-card delayed"
data-status="delayed">

<i class="fa-solid fa-clock"></i>

<h3>
مؤجل
</h3>

<span id="delayedCount">
0
</span>

</button>





<button class="status-card rejected"
data-status="rejected">

<i class="fa-solid fa-xmark"></i>

<h3>
مرفوض
</h3>

<span id="rejectedCount">
0
</span>

</button>


</section>









<section class="card">


<h2>
<i class="fa-solid fa-cart-shopping"></i>

الطلبات

</h2>




<div class="search-box">


<input id="search"

placeholder="بحث باسم الزبون او الرقم">




<input id="date"

type="date">





</div>







<table>


<thead>

<tr>


<th>
رقم
</th>


<th>
الزبون
</th>


<th>
الهاتف
</th>


<th>
المحافظة
</th>


<th>
القطعة
</th>


<th>
اللون
</th>


<th>
القياس
</th>


<th>
المبلغ
</th>


<th>
الحالة
</th>


<th>
تفاصيل
</th>


</tr>


</thead>



<tbody id="ordersTable">


</tbody>


</table>



</section>









<section class="analysis">



<div class="cards">


<div class="card">

<h3>
الطلبات
</h3>

<h2 id="ordersCount">
0
</h2>

</div>




<div class="card">

<h3>
المبيعات
</h3>

<h2 id="sales">
0
</h2>

</div>





<div class="card">

<h3>
الأرباح
</h3>

<h2 id="profits">
0
</h2>

</div>





<div class="card">

<h3>
VIP
</h3>

<h2 id="vipCustomers">
0
</h2>

</div>


</div>



</section>








<section class="charts">


<div class="card">

<h3>
المبيعات
</h3>

<canvas id="salesChart"></canvas>

</div>



<div class="card">

<h3>
الحالات
</h3>

<canvas id="statusChart"></canvas>

</div>



<div class="card">

<h3>
المحافظات
</h3>

<canvas id="govChart"></canvas>

</div>


</section>









<div id="modal">


<div class="card modal-box">


<button id="close">

<i class="fa-solid fa-xmark"></i>

</button>



<h2>
تفاصيل الطلب
</h2>



<div id="details">

</div>




<button id="editOrder">

<i class="fa-solid fa-pen"></i>

تعديل الطلب

</button>




<select id="changeStatus">


<option value="new">
جديد
</option>


<option value="ready">
مجهز
</option>


<option value="delivery">
قيد التوصيل
</option>


<option value="done">
مكتمل
</option>


<option value="delayed">
مؤجل
</option>


<option value="rejected">
مرفوض
</option>


</select>




<button id="saveStatus">

حفظ الحالة

</button>



</div>


</div>






</main>



<script type="module"
src="../js/order-management.js">

</script>



</body>

</html>
