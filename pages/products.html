<!DOCTYPE html>

<html lang="ar" dir="rtl">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>NIVRA Products</title>



<link rel="stylesheet" href="../css/products.css">



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>




<body>





<header class="topbar">



<div>


<h1>
NIVRA
</h1>


<span>
إدارة المنتجات
</span>


</div>




<button class="back-btn"
onclick="location.href='../dashboard.html'">


<i class="fa-solid fa-arrow-right"></i>


</button>



</header>









<main>






<section class="welcome">


<h2>


<i class="fa-solid fa-shirt"></i>


إدارة منتجات المتجر


</h2>


<p>

إضافة وتعديل وحذف المنتجات وربطها بالأصناف

</p>


</section>









<section class="form-box">





<h2>


<i class="fa-solid fa-plus"></i>


إضافة منتج


</h2>









<select id="category">


<option value="">


اختار الصنف


</option>


</select>








<input 

id="name"

placeholder="اسم المنتج">








<textarea 

id="description"

placeholder="وصف المنتج">


</textarea>









<input 

id="price"

type="number"

placeholder="السعر">








<input 
id="image"
placeholder="الصورة الرئيسية (مسار الصورة)">
<br>

<label>
صور إضافية للمنتج
</label>

<textarea
id="images"
placeholder="صور إضافية للمنتج

مثال:
A.png,
B.png,
C.png">
</textarea>

<button id="save">


<i class="fa-solid fa-floppy-disk"></i>


حفظ المنتج


</button>





</section>









<hr>








<h2 class="section-title">


<i class="fa-solid fa-layer-group"></i>


المنتجات


</h2>









<section id="list"
class="category-list">



</section>





</main>


<button id="scrollTop" class="scroll-top">

<i class="fa-solid fa-arrow-down"></i>

</button>

<script type="module" src="../js/products.js"></script>



</body>


</html>
