<!DOCTYPE html>

<html lang="ar" dir="rtl">


<head>


<title>NIVRA Users</title>


<link rel="stylesheet" href="../css/dashboard.css">


</head>



<body>



<header>


<h1>
إدارة المستخدمين
</h1>


</header>







<section class="cards">



<div class="card">

<h3>
كل المستخدمين
</h3>

<p id="usersCount">
0
</p>

</div>





<div class="card">

<h3>
المدراء
</h3>

<p id="adminsCount">
0
</p>

</div>





<div class="card">

<h3>
الموظفين
</h3>

<p id="employeesCount">
0
</p>

</div>




</section>









<hr>








<h2>
إضافة مستخدم
</h2>





<input

id="name"

placeholder="اسم المستخدم"

>





<br><br>





<input

id="phone"

placeholder="رقم الهاتف"

>







<br><br>






<input

id="email"

placeholder="البريد الالكتروني"

>







<br><br>






<select id="role">


<option value="admin">

مدير النظام

</option>



<option value="manager">

مدير

</option>




<option value="employee">

موظف

</option>


</select>







<br><br>






<button id="saveUser">


إضافة مستخدم


</button>







<hr>







<h2>
قائمة المستخدمين
</h2>






<input

id="search"

placeholder="بحث بالاسم او الهاتف"

>







<br><br>





<select id="filterRole">


<option value="">

كل الصلاحيات

</option>



<option value="admin">

مدراء

</option>



<option value="manager">

مدراء فرعيين

</option>



<option value="employee">

موظفين

</option>


</select>








<table border="1">


<thead>


<tr>


<th>
الاسم
</th>



<th>
الهاتف
</th>




<th>
الايميل
</th>




<th>
الصلاحية
</th>




<th>
تاريخ الانشاء
</th>




<th>
إجراء
</th>


</tr>



</thead>





<tbody id="usersList">


</tbody>



</table>









<script type="module" src="../js/users.js"></script>



</body>



</html>
